<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FuelRoute — Smart Road Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --border: #1e1e2e;
    --accent: #f97316;
    --accent2: #fb923c;
    --green: #22c55e;
    --muted: #4a4a6a;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --panel-w: 420px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: auto;
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDE PANEL */
  .panel {
    width: var(--panel-w);
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-inner {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel-inner::-webkit-scrollbar { width: 4px; }
  .panel-inner::-webkit-scrollbar-track { background: transparent; }
  .panel-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .form-group { display: flex; flex-direction: column; gap: 8px; }

  label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    width: 100%;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(249,115,22,0.15);
  }
  input[type="text"]::placeholder { color: var(--muted); }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 20px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .btn:hover { background: var(--accent2); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

  /* EXAMPLE ROUTES */
  .examples-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .example-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    font-family: 'DM Mono', monospace;
  }
  .example-chip:hover { border-color: var(--accent); color: var(--accent); }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: var(--border);
  }

  /* LOADING */
  .loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 20px 0;
  }
  .loading.active { display: flex; }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* ERROR */
  .error-box {
    display: none;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.35);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    color: #fca5a5;
    line-height: 1.5;
  }
  .error-box.active { display: block; }

  /* RESULTS */
  .results { display: none; flex-direction: column; gap: 16px; }
  .results.active { display: flex; }

  /* SUMMARY CARD */
  .summary-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .summary-card h3 {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 700;
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--green); }
  .stat-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* STOPS */
  .stops-header {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .stop-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .stop-card:hover { border-color: var(--accent); }

  .stop-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .stop-body { flex: 1; min-width: 0; }
  .stop-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .stop-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .stop-price { color: var(--green); font-weight: 500; }
  .stop-cost { color: var(--accent); font-weight: 500; }

  /* MAP */
  #map {
    flex: 1;
    background: #0d0d1a;
  }

  /* Leaflet dark overrides */
  .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.85) saturate(0.9); }
  .leaflet-popup-content-wrapper {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
  }
  .leaflet-popup-tip { background: var(--surface); }
  .leaflet-popup-content { margin: 14px 16px; line-height: 1.6; }
  .leaflet-popup-content strong { color: var(--accent); }
  .popup-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .popup-val { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .popup-row { display: flex; justify-content: space-between; gap: 20px; font-size: 13px; margin-top: 4px; }
  .popup-row span:last-child { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="logo">Fuel<span>Route</span></div>
  <div class="tagline">Smart USA Road Trip Planner</div>
</header>

<div class="main">
  <div class="panel">
    <div class="panel-inner">

      <div class="form-group">
        <label>Starting Point</label>
        <input type="text" id="start" placeholder="e.g. Chicago, IL" autocomplete="off"/>
      </div>

      <div class="form-group">
        <label>Destination</label>
        <input type="text" id="finish" placeholder="e.g. Los Angeles, CA" autocomplete="off"/>
      </div>

      <button class="btn" id="planBtn" onclick="planRoute()">Plan Route →</button>

      <div>
        <p class="examples-label">Quick examples</p>
        <div class="examples">
          <span class="example-chip" onclick="setExample('New York, NY','Los Angeles, CA')">NY → LA</span>
          <span class="example-chip" onclick="setExample('Chicago, IL','Houston, TX')">Chicago → Houston</span>
          <span class="example-chip" onclick="setExample('Seattle, WA','Miami, FL')">Seattle → Miami</span>
          <span class="example-chip" onclick="setExample('Denver, CO','Dallas, TX')">Denver → Dallas</span>
          <span class="example-chip" onclick="setExample('Boston, MA','Atlanta, GA')">Boston → Atlanta</span>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Loading -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Calculating optimal route...</p>
      </div>

      <!-- Error -->
      <div class="error-box" id="errorBox"></div>

      <!-- Results -->
      <div class="results" id="results">

        <div class="summary-card" id="summaryCard"></div>

        <p class="stops-header" id="stopsHeader"></p>

        <div id="stopsList"></div>

      </div>

    </div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── MAP INIT ──────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([39.5, -98.35], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 18,
}).addTo(map);

let routeLayer = null;
let markerGroup = L.layerGroup().addTo(map);

// Custom icons
function makeIcon(color, label) {
  return L.divIcon({
    html: `<div style="
      background:${color};width:32px;height:32px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:#fff;
      border:2px solid rgba(255,255,255,0.25);box-shadow:0 2px 8px rgba(0,0,0,0.5);
    ">${label}</div>`,
    className: '',
    iconSize: [32, 32],
    iconAnchor: [16, 16],
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function setExample(start, finish) {
  document.getElementById('start').value = start;
  document.getElementById('finish').value = finish;
}

function showLoading(on) {
  document.getElementById('loading').classList.toggle('active', on);
  document.getElementById('planBtn').disabled = on;
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('active');
}

function clearError() {
  document.getElementById('errorBox').classList.remove('active');
}

function showResults(data) {
  const s = data.summary;
  const stops = data.fuel_stops;

  // Summary card
  document.getElementById('summaryCard').innerHTML = `
    <h3>Trip Summary</h3>
    <div class="stat-grid">
      <div class="stat">
        <span class="stat-label">Total Distance</span>
        <span class="stat-value">${s.total_distance_miles.toLocaleString()}</span>
        <span class="stat-sub">miles</span>
      </div>
      <div class="stat">
        <span class="stat-label">Drive Time</span>
        <span class="stat-value">${s.estimated_drive_time}</span>
        <span class="stat-sub">estimated</span>
      </div>
      <div class="stat">
        <span class="stat-label">Total Fuel Cost</span>
        <span class="stat-value accent">$${s.total_fuel_cost_usd.toFixed(2)}</span>
        <span class="stat-sub">${s.total_gallons_needed} gallons @ 10 mpg</span>
      </div>
      <div class="stat">
        <span class="stat-label">Fuel Stops</span>
        <span class="stat-value green">${s.fuel_stops_count}</span>
        <span class="stat-sub">optimized for cost</span>
      </div>
    </div>
  `;

  // Stops
  const header = document.getElementById('stopsHeader');
  header.textContent = stops.length
    ? `Fuel Stops (${stops.length})`
    : 'No Fuel Stops Needed';

  const list = document.getElementById('stopsList');
  list.innerHTML = stops.map((stop, i) => `
    <div class="stop-card" onclick="flyToStop(${stop.lat}, ${stop.lon}, ${i+1})">
      <div class="stop-num">${stop.stop_number}</div>
      <div class="stop-body">
        <div class="stop-name">${stop.truckstop_name || (stop.city + ', ' + stop.state_code)}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:2px">${stop.city}, ${stop.state_code} · Mile ${stop.miles_into_route}</div>
        <div class="stop-meta">
          <span class="stop-price">$${stop.price_per_gallon.toFixed(3)}/gal</span>
          <span class="stop-cost">$${stop.cost_at_stop.toFixed(2)} total</span>
          <span>${stop.gallons_purchased} gal</span>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('results').classList.add('active');
}

function flyToStop(lat, lon, num) {
  map.flyTo([lat, lon], 10, { duration: 0.8 });
}

// ── DECODE POLYLINE ───────────────────────────────────────────────────────
function decodePolyline(encoded) {
  const coords = [];
  let index = 0, lat = 0, lon = 0;
  while (index < encoded.length) {
    for (let isLon = 0; isLon < 2; isLon++) {
      let shift = 0, result = 0, b;
      do {
        b = encoded.charCodeAt(index++) - 63;
        result |= (b & 0x1f) << shift;
        shift += 5;
      } while (b >= 0x20);
      const delta = (result & 1) ? ~(result >> 1) : (result >> 1);
      if (isLon) lon += delta; else lat += delta;
    }
    coords.push([lat / 1e5, lon / 1e5]);
  }
  return coords;
}

// ── PLAN ROUTE ────────────────────────────────────────────────────────────
async function planRoute() {
  clearError();
  document.getElementById('results').classList.remove('active');

  const start = document.getElementById('start').value.trim();
  const finish = document.getElementById('finish').value.trim();

  if (!start || !finish) {
    showError('Please enter both a starting point and a destination.');
    return;
  }

  showLoading(true);

  // Clear previous map layers
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  markerGroup.clearLayers();

  try {
    const resp = await fetch('/api/route/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ start, finish }),
    });
    const data = await resp.json();

    if (!resp.ok) {
      showError(data.error || 'Something went wrong. Please try again.');
      return;
    }

    // ── Draw route ──
    const coords = decodePolyline(data.route.polyline_encoded);
    routeLayer = L.polyline(coords, {
      color: '#f97316',
      weight: 4,
      opacity: 0.85,
    }).addTo(map);
    map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });

    // ── Start marker ──
    const sc = data.summary.start_coords;
    L.marker([sc.lat, sc.lon], { icon: makeIcon('#22c55e', 'S') })
      .addTo(markerGroup)
      .bindPopup(`<div class="popup-label">Start</div><div class="popup-val">${data.summary.start}</div>`);

    // ── Finish marker ──
    const fc = data.summary.finish_coords;
    L.marker([fc.lat, fc.lon], { icon: makeIcon('#3b82f6', 'F') })
      .addTo(markerGroup)
      .bindPopup(`<div class="popup-label">Finish</div><div class="popup-val">${data.summary.finish}</div>`);

    // ── Fuel stop markers ──
    data.fuel_stops.forEach(stop => {
      L.marker([stop.lat, stop.lon], { icon: makeIcon('#f97316', stop.stop_number) })
        .addTo(markerGroup)
        .bindPopup(`
          <div class="popup-label">Fuel Stop ${stop.stop_number}</div>
          <div class="popup-val">${stop.truckstop_name || (stop.city + ', ' + stop.state)}</div>
          ${stop.address ? `<div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">${stop.address} · ${stop.city}, ${stop.state_code}</div>` : ''}
          <div class="popup-row"><span>Price/gal</span><span>$${stop.price_per_gallon.toFixed(3)}</span></div>
          <div class="popup-row"><span>Gallons</span><span>${stop.gallons_purchased}</span></div>
          <div class="popup-row"><span>Stop Cost</span><span>$${stop.cost_at_stop.toFixed(2)}</span></div>
          <div class="popup-row"><span>Mile Marker</span><span>${stop.miles_into_route}</span></div>
        `);
    });

    showResults(data);

  } catch (err) {
    showError('Network error — is the server running?');
    console.error(err);
  } finally {
    showLoading(false);
  }
}

// Enter key support
document.getElementById('finish').addEventListener('keydown', e => {
  if (e.key === 'Enter') planRoute();
});
document.getElementById('start').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('finish').focus();
});
</script>
</body>
</html>
